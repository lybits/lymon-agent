name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Checkout this repo into ./lymon-agent
      - uses: actions/checkout@v4
        with:
          path: lymon-agent

      # Checkout protos as sibling at ./lymon-protos (build.rs expects this)
      - uses: actions/checkout@v4
        with:
          repository: lybits/lymon-protos
          path: lymon-protos

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Root is a package (the agent), so a bare build skips member binaries.
      # Build the agent + the s7 plugin so both are gated in CI.
      - name: Cargo build
        working-directory: ./lymon-agent
        run: cargo build --release -p lymon-agent -p lymon-plugin-s7

      - name: Cargo test
        working-directory: ./lymon-agent
        run: cargo test --release

      - name: Cargo clippy
        if: runner.os == 'Linux'
        working-directory: ./lymon-agent
        run: cargo clippy --release --all-targets -- -D warnings

      # First-party plugins kept OUT of the workspace (own Cargo.lock, heavy
      # deps) still ship with the agent — gate them in CI so they don't rot.
      # The s7 plugin is a workspace member and is already covered above.
      - name: Build OPC-UA plugin (excluded from workspace)
        working-directory: ./lymon-agent
        run: cargo build --release --manifest-path crates/plugin-opcua/Cargo.toml

      - name: Clippy OPC-UA plugin
        if: runner.os == 'Linux'
        working-directory: ./lymon-agent
        run: cargo clippy --release --manifest-path crates/plugin-opcua/Cargo.toml -- -D warnings

      - name: Binary size check (Linux)
        if: runner.os == 'Linux'
        working-directory: ./lymon-agent
        run: |
          SIZE=$(stat -c%s target/release/lymon-agent)
          echo "Binary size: $SIZE bytes"
          # Criterio 5: <15MB stripped
          if [ "$SIZE" -gt 15728640 ]; then
            echo "ERROR: binary exceeds 15 MiB limit"
            exit 1
          fi
