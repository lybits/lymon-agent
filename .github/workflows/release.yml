name: Release

# Builds the agent for Windows / Linux / macOS and attaches the binaries to a
# GitHub Release, so operators can download a ready-to-run agent from the
# portal's "Add agent" install links. Triggered by pushing a v* tag, or
# manually (workflow_dispatch) to produce artifacts without cutting a release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write   # create releases + upload assets

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            slug: windows-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            slug: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            slug: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: lymon-agent

      - uses: actions/checkout@v4
        with:
          repository: lybits/lymon-protos
          path: lymon-protos

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # The workspace root IS a package (the agent), so a bare `cargo build`
      # builds ONLY the agent — NOT the member binaries. List the s7 plugin
      # explicitly so its binary lands in the target dir for the bundle.
      - name: Build agent + s7 plugin
        working-directory: ./lymon-agent
        run: cargo build --release --target ${{ matrix.target }} -p lymon-agent -p lymon-plugin-s7

      # The OPC-UA plugin is kept out of the workspace (own Cargo.lock, heavy
      # deps), so it needs its own build — but it's first-party and ships in
      # the bundle below.
      - name: Build OPC-UA plugin
        working-directory: ./lymon-agent
        run: cargo build --release --target ${{ matrix.target }} --manifest-path crates/plugin-opcua/Cargo.toml

      # Assemble a drop-in bundle: the agent binary plus a plugins/ tree in the
      # exact layout PluginHost::discover expects (<plugins_dir>/<name>/{plugin.json,binary}).
      # The operator unpacks it under the agent's buffer dir and is done.
      - name: Stage bundle
        shell: bash
        working-directory: ./lymon-agent
        run: |
          set -euo pipefail
          EXT="${{ matrix.ext }}"
          TARGET="${{ matrix.target }}"
          # Agent + s7 are workspace members → root target dir. The OPC-UA plugin
          # is EXCLUDED from the workspace (own Cargo.lock), so cargo writes it
          # under its OWN crate target dir, not the root one.
          ROOT="target/$TARGET/release"
          OPCUA="crates/plugin-opcua/target/$TARGET/release"
          BUNDLE="lymon-agent-${{ matrix.slug }}"
          mkdir -p dist
          # Raw agent binary kept as a standalone asset. On Linux/macOS its name
          # ("lymon-agent-<slug>", no ext) collides with the bundle DIR of the
          # same name, so the bundle is staged under dist/bundle/ instead.
          cp "$ROOT/lymon-agent$EXT" "dist/lymon-agent-${{ matrix.slug }}$EXT"
          # Drop-in bundle layout under dist/bundle/<BUNDLE>/.
          B="dist/bundle/$BUNDLE"
          mkdir -p "$B/plugins/lymon-plugin-opcua" "$B/plugins/lymon-plugin-s7"
          cp "$ROOT/lymon-agent$EXT"         "$B/"
          cp "$OPCUA/lymon-plugin-opcua$EXT" "$B/plugins/lymon-plugin-opcua/"
          cp "$ROOT/lymon-plugin-s7$EXT"     "$B/plugins/lymon-plugin-s7/"
          cp crates/plugin-opcua/plugin.json "$B/plugins/lymon-plugin-opcua/"
          cp crates/plugin-s7/plugin.json    "$B/plugins/lymon-plugin-s7/"
          # On Windows the manifest exec must carry .exe to launch.
          if [ -n "$EXT" ]; then
            sed -i 's#"\./lymon-plugin-opcua"#"./lymon-plugin-opcua.exe"#' "$B/plugins/lymon-plugin-opcua/plugin.json"
            sed -i 's#"\./lymon-plugin-s7"#"./lymon-plugin-s7.exe"#'       "$B/plugins/lymon-plugin-s7/plugin.json"
          fi

      - name: Archive bundle (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: ./lymon-agent
        run: tar -czf "dist/lymon-agent-${{ matrix.slug }}.tar.gz" -C dist/bundle "lymon-agent-${{ matrix.slug }}"

      - name: Archive bundle (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: ./lymon-agent
        run: Compress-Archive -Path "dist/bundle/lymon-agent-${{ matrix.slug }}" -DestinationPath "dist/lymon-agent-${{ matrix.slug }}.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lymon-agent-${{ matrix.slug }}
          path: |
            lymon-agent/dist/lymon-agent-${{ matrix.slug }}${{ matrix.ext }}
            lymon-agent/dist/lymon-agent-${{ matrix.slug }}.tar.gz
            lymon-agent/dist/lymon-agent-${{ matrix.slug }}.zip
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lymon-agent/dist/lymon-agent-${{ matrix.slug }}${{ matrix.ext }}
            lymon-agent/dist/lymon-agent-${{ matrix.slug }}.tar.gz
            lymon-agent/dist/lymon-agent-${{ matrix.slug }}.zip
          fail_on_unmatched_files: false
